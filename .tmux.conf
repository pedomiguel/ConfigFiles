# GENERAL
set-option -g prefix C-space
set-environment -g DISPLAY ":0"

set -g mouse on
setw -g mode-keys vi
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

# BINDS
unbind-key &
unbind-key x

bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in" # Copy to system clipboard (X11)

bind-key -n 'C-n' next-window
bind-key -n 'C-p' previous-window
bind-key 0 last-window

bind v split-window -v -c "#{pane_current_path}"
bind h split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind-key n new-session -c "#{pane_current_path}"

bind-key x kill-pane
bind-key X confirm-before -p "Kill session? (y/n)" kill-session
bind-key & confirm-before -p "Kill window? (y/n)" kill-window

bind-key Enter display-popup -w 70% -h 70% -d "#{pane_current_path}"
bind-key g display-popup -E -w 70% -h 70% -d "#{pane_current_path}" "lazygit"
bind-key r display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "ranger"

# STYLES
set-option -g status-style bg=default
set -g status-position top
set -g status "on"
set -g status-fg "white"

set -g status-justify "centre"

set -g status-left-length "100"
set -g status-right-length "100"
set -g status-left ' #{tmux_mode_indicator} #S'
set -g status-right '#[fg=yellow]󰐥 #[fg=white]#(uptime | awk -F "load average:" "{print $2}" | cut -d, -f1) #[fg=white]#[fg=cyan]󰇄 #[fg=white]#H '

set -g window-status-current-format ' #W#{?window_zoomed_flag, ,}'
set -g window-status-last-style 'default'
set -g window-status-format '#{?window_last_flag,󰖰 ,}#W#{?window_zoomed_flag, ,}'

set -g pane-border-style fg="gray"
set -g pane-active-border-style fg="blue"

set -g message-style fg="white",bg="default",align="centre"
set -g message-command-style fg="white",bg="default",align="centre"

set -g copy-mode-selection-style "bg=#ffd866,fg=#1e1e1e"
set -g copy-mode-match-style "bg=#a6e22e,fg=black"
set -g copy-mode-current-match-style "bg=#ff6188,fg=white"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'tmux-plugins/tmux-urlview' # need urlview
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'
set-option -g @plugin 'b0o/tmux-autoreload' # needs entr

# Mode Indicator
set -g @mode_indicator_empty_prompt ''
set -g @mode_indicator_prefix_prompt ''
set -g @mode_indicator_copy_prompt '󰆏'
set -g @mode_indicator_sync_prompt ''

set -g @mode_indicator_prefix_mode_style "bg=default,fg=white"
set -g @mode_indicator_copy_mode_style "bg=default,fg=white"
set -g @mode_indicator_sync_mode_style "bg=default,fg=white"
set -g @mode_indicator_empty_mode_style "bg=default,fg=white"

# Resurrect
set -g @resurrect-strategy-nvim 'session'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
