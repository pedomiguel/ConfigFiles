preload = ~/Pictures/wallpapers/sollee.png
preload = ~/Pictures/wallpapers/download.jpeg
preload = ~/Pictures/wallpapers/ubuntu_synthwave.webp
preload = ~/Pictures/wallpapers/saturn_retrowave.jpg
#if more than one preload is desired then continue to preload other backgrounds
# preload = /path/to/next_image.png
# .. more preloads

#set the default wallpaper(s) seen on initial workspace(s) --depending on the number of monitors used
wallpaper = eDP-1,~/Pictures/wallpapers/download.jpeg
#if more than one monitor in use, can load a 2nd image
wallpaper = HDMI-A-1,~/Pictures/wallpapers/saturn_retrowave.jpg
# .. more monitors

#enable splash text rendering over the wallpaper
splash = true

#fully disable ipc
# ipc = off
